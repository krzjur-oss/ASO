<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Akademia Systemów Operacyjnych - Interaktywny Symulator</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#5E81AC" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Akademia SO" />
    <link rel="apple-touch-icon" href="./icon-512.jpg" />
    <link rel="icon" type="image/jpeg" href="./icon-512.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then((reg) => {
              console.log('Service Worker zarejestrowany pomyślnie!', reg.scope);
            })
            .catch((err) => {
              console.warn('Rejestracja Service Workera nie powiodła się:', err);
            });
        });
      }
    </script>
  </body>
</html>
